name: Deploy PR Preview

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    # Only run when PR is from the same repo (not a fork) so VERCEL_* secrets are available
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            sudo apt-get update
            sudo apt-get install -y postgresql-client
            npm install --global prisma@6
            npm ci

      ###########################################################
      # 1️⃣ Select Rotating Preview Slot
      ###########################################################
      - name: Select Preview Slot
        id: slot
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SLOT=$(( PR_NUMBER % 10 + 1 ))
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "preview_branch=preview-$SLOT" >> $GITHUB_OUTPUT
          echo "preview_url=hive-preview-$SLOT.sphinx.chat" >> $GITHUB_OUTPUT

      ############################################################
      # 2️⃣ Force Preview Branch To PR Commit
      ############################################################
      - name: Force Update Preview Branch
        run: |
          PREVIEW_BRANCH="${{ steps.slot.outputs.preview_branch }}"
          PR_SHA="${{ github.sha }}"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin
            if git push origin "$PR_SHA:refs/heads/$PREVIEW_BRANCH" --force; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi
            SLEEP=$((attempt * 10))
            echo "Push failed (attempt $attempt), retrying in ${SLEEP}s..."
            sleep $SLEEP
          done

      ############################################################
      # 2b️⃣ Checkout preview branch so Vercel deploys as preview-1/2/3
      ############################################################
      - name: Checkout Preview Branch
        run: |
          git fetch origin
          git checkout "${{ steps.slot.outputs.preview_branch }}"

      ############################################################
      # 3️⃣ Prepare Neon Preview Database
      ############################################################
      - name: Prepare Neon Preview Database
        id: neon
        run: |
          set -e

          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          EXPIRY=$(date -u +"%Y-%m-%dT%H:%M:%SZ" -d "5 hours")

          # Helper: curl with retry (up to 5 attempts, 10 s backoff).
          # Retries on empty body OR on non-JSON / error responses that don't
          # contain the expected top-level key (passed as $2).
          # Usage: neon_curl <url> <expected_key> [extra curl args...]
          neon_curl() {
            local url="$1"
            local expected_key="$2"
            shift 2
            local response
            for attempt in 1 2 3 4 5; do
              response=$(curl -s --retry 2 --retry-delay 5 --retry-connrefused \
                -H "Authorization: Bearer $NEON_API_KEY" "$@" "$url")
              if [ -n "$response" ] && echo "$response" | jq -e ".$expected_key" > /dev/null 2>&1; then
                echo "$response"
                return 0
              fi
              echo "⚠️  Neon API bad/empty response (attempt $attempt/5) for $url — got: ${response:0:120}" >&2
              sleep 10
            done
            echo "❌ Neon API failed after 5 attempts for: $url" >&2
            echo "$response"   # emit last response so caller can print it
            return 1
          }

          # Get preview-base branch ID (expected key: "branches")
          BRANCHES_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" "branches")
          PARENT_BRANCH_ID=$(echo "$BRANCHES_JSON" | jq -r '.branches[] | select(.name=="preview-base") | .id')

          if [ -z "$PARENT_BRANCH_ID" ] || [ "$PARENT_BRANCH_ID" = "null" ]; then
            echo "❌ Could not find preview-base branch"
            exit 1
          fi

          # Create or reuse PR branch
          BRANCH_ID=$(echo "$BRANCHES_JSON" | jq -r ".branches[] | select(.name==\"$BRANCH_NAME\") | .id")

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            RESPONSE=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" "branch" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"branch\":{\"name\":\"$BRANCH_NAME\",\"parent_id\":\"$PARENT_BRANCH_ID\",\"expires_at\":\"$EXPIRY\"}}")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          fi

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            echo "❌ Failed to obtain branch ID"
            exit 1
          fi

          # Wait until branch is ready
          for i in {1..20}; do
            BRANCH_STATUS=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" "branch")
            STATE=$(echo "$BRANCH_STATUS" | jq -r '.branch.current_state')
            if [ "$STATE" = "ready" ]; then break; fi
            echo "Waiting for branch... ($i)"
            sleep 3
          done

          # Create or reuse endpoint
          ENDPOINTS_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints" "endpoints")
          ENDPOINT_ID=$(echo "$ENDPOINTS_JSON" | jq -r ".endpoints[] | select(.branch_id==\"$BRANCH_ID\") | .id")

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            # Try to create a new endpoint first
            RESPONSE=$(curl -s -H "Authorization: Bearer $NEON_API_KEY" \
              -X POST -H "Content-Type: application/json" \
              -d "{\"endpoint\":{\"branch_id\":\"$BRANCH_ID\",\"type\":\"read_write\"}}" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints")

            if echo "$RESPONSE" | jq -e '.endpoint' > /dev/null 2>&1; then
              ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.endpoint.id')
            else
              echo "⚠️  Endpoint creation failed (likely limit exceeded): $(echo "$RESPONSE" | jq -r '.message // .code // empty')"
              echo "♻️  Looking for a stale endpoint to reassign..."

              # Find an endpoint not belonging to preview-base or the current branch
              STALE_ENDPOINT_ID=$(echo "$ENDPOINTS_JSON" | jq -r \
                --arg bid "$BRANCH_ID" \
                --arg pbid "$PARENT_BRANCH_ID" \
                '.endpoints[] | select(.branch_id != $bid and .branch_id != $pbid and .type == "read_write") | .id' \
                | head -1)

              if [ -z "$STALE_ENDPOINT_ID" ] || [ "$STALE_ENDPOINT_ID" = "null" ]; then
                echo "❌ No stale endpoint available to reassign"
                exit 1
              fi

              echo "♻️  Reassigning endpoint $STALE_ENDPOINT_ID to branch $BRANCH_ID..."
              RESPONSE=$(neon_curl \
                "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints/$STALE_ENDPOINT_ID" "endpoint" \
                -X PATCH \
                -H "Content-Type: application/json" \
                -d "{\"endpoint\":{\"branch_id\":\"$BRANCH_ID\"}}")
              ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.endpoint.id')
            fi
          fi

          # Wait until endpoint is ready (GET endpoint does not return credentials)
          for i in {1..30}; do
            STATUS=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints/$ENDPOINT_ID" "endpoint")
            STATE=$(echo "$STATUS" | jq -r '.endpoint.current_state')
            DB_HOST=$(echo "$STATUS" | jq -r '.endpoint.host')
            if [ "$STATE" = "ready" ] && [ -n "$DB_HOST" ] && [ "$DB_HOST" != "null" ]; then
              break
            fi
            echo "Waiting for endpoint... ($i)"
            sleep 3
          done

          if [ -z "$DB_HOST" ] || [ "$DB_HOST" = "null" ]; then
            echo "❌ Endpoint never became ready"
            exit 1
          fi

          # Get a role name for this branch (Neon GET endpoint does not return credentials)
          ROLES_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/roles" "roles")
          ROLE_NAME=$(echo "$ROLES_JSON" | jq -r '.roles[0].name // empty')
          if [ -z "$ROLE_NAME" ]; then
            echo "❌ No roles found for branch $BRANCH_ID"
            exit 1
          fi

          # Retrieve full connection URI (includes encoded credentials)
          URI_RESPONSE=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&endpoint_id=$ENDPOINT_ID&database_name=neondb&role_name=$ROLE_NAME" "uri")
          CONNECTION_URI=$(echo "$URI_RESPONSE" | jq -r '.uri // empty')
          if [ -z "$CONNECTION_URI" ]; then
            echo "❌ Failed to get connection URI: $URI_RESPONSE"
            exit 1
          fi

          # Verify actual DB connectivity before proceeding
          # Neon requires sslmode=require; append if not already present
          PSQL_URI="$CONNECTION_URI"
          if [[ "$PSQL_URI" != *"sslmode="* ]]; then
            if [[ "$PSQL_URI" == *"?"* ]]; then
              PSQL_URI="${PSQL_URI}&sslmode=require"
            else
              PSQL_URI="${PSQL_URI}?sslmode=require"
            fi
          fi
          echo "Verifying database connectivity..."
          for i in {1..30}; do
            if psql "$PSQL_URI" -c "SELECT 1;" > /dev/null 2>&1; then
              echo "✅ Database connection verified"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Database connection failed after 30 attempts"
              exit 1
            fi
            echo "Waiting for database connectivity... ($i)"
            sleep 10
          done

          # Pass URI to next steps (delimiter format for special chars in password)
          echo "connection_uri<<EOF" >> $GITHUB_OUTPUT
          echo "$CONNECTION_URI" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "expires_at=$EXPIRY" >> $GITHUB_OUTPUT

      ############################################################
      # 4️⃣ Debug Neon (Optional)
      ############################################################
      - name: Debug Neon
        run: |
          echo "Connection URI is set (masked for security)"

      ############################################################
      # 5️⃣ Setup Node + Vercel
      ############################################################
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=preview --git-branch=${{ steps.slot.outputs.preview_branch }} --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_TOKEN }}

      ############################################################
      # 6️⃣ Build with Prisma
      ############################################################

      - name: Resolve Failed Migrations
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"
          echo "Checking for failed migrations..."

          # Helper: resolve a migration based on whether its DDL column/table already exists
          resolve_migration() {
            local MIGRATION_NAME="$1"
            local CHECK_QUERY="$2"

            # Check if this migration is recorded as failed in _prisma_migrations
            FAILED=$(psql "$DATABASE_URL" -tAc \
              "SELECT COUNT(*) FROM _prisma_migrations WHERE migration_name='${MIGRATION_NAME}' AND finished_at IS NULL AND applied_steps_count > 0;" 2>/dev/null || echo "0")
            FAILED=$(echo "$FAILED" | tr -d '[:space:]')

            if [ "$FAILED" = "1" ]; then
              echo "Migration ${MIGRATION_NAME} is in failed state, resolving..."
              OBJECT_EXISTS=$(psql "$DATABASE_URL" -tAc "${CHECK_QUERY}" 2>/dev/null | tr -d '[:space:]')
              if [ "$OBJECT_EXISTS" = "1" ]; then
                echo "  DDL already applied — marking as applied"
                npx prisma migrate resolve --applied "${MIGRATION_NAME}" || echo "  Could not mark as applied"
              else
                echo "  DDL not applied — marking as rolled-back for retry"
                npx prisma migrate resolve --rolled-back "${MIGRATION_NAME}" || echo "  Could not mark as rolled-back"
              fi
            else
              echo "Migration ${MIGRATION_NAME} is not in a failed state, skipping"
            fi
          }

          resolve_migration \
            "20260218154809_add_swarm_description" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='swarms' AND column_name='description';"

          resolve_migration \
            "20260301051356_add_voice_signature_to_user" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='users' AND column_name='voice_signature_key';"

          resolve_migration \
            "20260220101159_add_repository_id_to_janitor_run" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='janitor_runs' AND column_name='repository_id';"

          resolve_migration \
            "20260227180738_add_feature_id_to_screenshots" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='screenshots' AND column_name='feature_id';"

          resolve_migration \
            "20260313120000_fix_mocks_enabled_default" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='repositories' AND column_name='mocks_enabled' AND column_default='false';"

          resolve_migration \
            "20260228185557_default_ticket_sweep_enabled" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='janitor_configs' AND column_name='ticket_sweep_enabled' AND column_default='true';"

          resolve_migration \
            "20260319000000_add_created_by_id_to_whiteboards" \
            "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='whiteboards' AND column_name='created_by_id';"

          # Force-resolve the stale failed migration 20260401174012 that is blocking deploys
          echo "Attempting to resolve stale failed migration 20260401174012..."
          npx prisma migrate resolve --rolled-back "20260401174012" 2>&1 || true

      - name: Build
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"
          echo "DATABASE_URL is set (masked)"
          npx prisma generate

          # Retry prisma migrate deploy — Neon endpoint may sleep between steps
          for attempt in 1 2 3 4 5; do
            if npx prisma migrate deploy; then
              echo "✅ Migrations deployed successfully (attempt $attempt)"
              break
            fi
            if [ $attempt -eq 5 ]; then
              echo "❌ prisma migrate deploy failed after 5 attempts"
              exit 1
            fi
            echo "⚠️  Migration attempt $attempt failed, waiting 15s before retry..."
            sleep 15
          done

          vercel build --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_TOKEN }}

      ############################################################
      # 7️⃣ Deploy to Vercel (with retry logic for transient errors)
      ############################################################
      - name: Deploy
        id: deploy
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"

          # Retry logic for transient Vercel deployment errors with exponential backoff
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Deployment attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            
            if DEPLOY_OUTPUT=$(vercel deploy \
              --prebuilt \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --archive=tgz \
              --force \
              --env "DATABASE_URL=$DATABASE_URL" \
              --env "PREVIEW_LINK_BRANCH=${{ github.event.pull_request.head.ref }}" \
              --yes 2>&1); then
              # Extract the Preview URL from the output
              DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Preview: \Khttps://[^\s]+' | head -1)
              if [ -z "$DEPLOYMENT_URL" ]; then
                echo "Failed to extract deployment URL from output:"
                echo "$DEPLOY_OUTPUT"
                exit 1
              fi
              echo "Deployment URL: $DEPLOYMENT_URL"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                WAIT_TIME=$((30 * RETRY_COUNT))
                echo "Deployment failed, waiting $WAIT_TIME seconds before retry..."
                sleep $WAIT_TIME
              else
                echo "Deployment failed after $MAX_RETRIES attempts"
                echo "$DEPLOY_OUTPUT"
                exit 1
              fi
            fi
          done

          # Attach alias (--scope ensures we use Stakwork org, not token default)
          vercel alias set $DEPLOYMENT_URL ${{ steps.slot.outputs.preview_url }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --token=${{ secrets.VERCEL_TOKEN }}

          echo "deployment_url=https://${{ steps.slot.outputs.preview_url }}" >> $GITHUB_OUTPUT

      ############################################################
      # 8️⃣ Mark GitHub Deployment Status
      ############################################################
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `preview-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: 'PR preview deployment'
            });
            return deployment.data.id;

      - name: Mark Success
        if: success() && steps.deployment.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.deployment_url }}'
            });

      - name: Comment PR with preview URL
        if: success() && steps.deploy.outputs.deployment_url
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hive-preview-deploy -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComments = comments.filter(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const expiresAt = '${{ steps.neon.outputs.expires_at }}';
            const expiresReadable = expiresAt ? new Date(expiresAt).toLocaleString('en-US', { timeZone: 'UTC', dateStyle: 'medium', timeStyle: 'short' }) + ' UTC' : 'N/A';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Test environment is now live.**\n\nView it at: ${url}\n\nDatabase expires at: ${expiresReadable}\n\n${marker}`
            });

      - name: Mark Failure
        if: failure() && steps.deployment.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure'
            });
