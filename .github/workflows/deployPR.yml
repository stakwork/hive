name: Deploy PR Preview

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    # Only run when PR is from the same repo (not a fork) so VERCEL_* secrets are available
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            sudo apt-get update
            sudo apt-get install -y postgresql-client
            npm install --global prisma@6
            npm ci

      ###########################################################
      # 1️⃣ Select Rotating Preview Slot
      ###########################################################
      - name: Select Preview Slot
        id: slot
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SLOT=$(( PR_NUMBER % 10 + 1 ))
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "preview_branch=preview-$SLOT" >> $GITHUB_OUTPUT
          echo "preview_url=hive-preview-$SLOT.sphinx.chat" >> $GITHUB_OUTPUT

      ############################################################
      # 2️⃣ Force Preview Branch To PR Commit
      ############################################################
      - name: Force Update Preview Branch
        run: |
          PREVIEW_BRANCH="${{ steps.slot.outputs.preview_branch }}"
          PR_SHA="${{ github.sha }}"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin
          git push origin "$PR_SHA:refs/heads/$PREVIEW_BRANCH" --force

      ############################################################
      # 2b️⃣ Checkout preview branch so Vercel deploys as preview-1/2/3
      ############################################################
      - name: Checkout Preview Branch
        run: |
          git fetch origin
          git checkout "${{ steps.slot.outputs.preview_branch }}"

      ############################################################
      # 3️⃣ Prepare Neon Preview Database
      ############################################################
      - name: Prepare Neon Preview Database
        id: neon
        run: |
          set -e

          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          EXPIRY=$(date -u +"%Y-%m-%dT%H:%M:%SZ" -d "5 hours")

          # Helper: curl with retry (up to 5 attempts, 5 s backoff) so transient
          # empty responses don't kill the pipeline before jq even runs.
          neon_curl() {
            local url="$1"
            shift
            local response
            for attempt in 1 2 3 4 5; do
              response=$(curl -s --retry 3 --retry-delay 5 --retry-connrefused \
                -H "Authorization: Bearer $NEON_API_KEY" "$@" "$url")
              if [ -n "$response" ]; then
                echo "$response"
                return 0
              fi
              echo "⚠️  Empty response from Neon API (attempt $attempt/5), retrying in 5s..." >&2
              sleep 5
            done
            echo "❌ Neon API returned empty response after 5 attempts for: $url" >&2
            return 1
          }

          # Get preview-base branch ID
          BRANCHES_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")
          PARENT_BRANCH_ID=$(echo "$BRANCHES_JSON" | jq -r '.branches[] | select(.name=="preview-base") | .id')

          if [ -z "$PARENT_BRANCH_ID" ] || [ "$PARENT_BRANCH_ID" = "null" ]; then
            echo "❌ Could not find preview-base branch"
            exit 1
          fi

          # Create or reuse PR branch
          BRANCH_ID=$(echo "$BRANCHES_JSON" | jq -r ".branches[] | select(.name==\"$BRANCH_NAME\") | .id")

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            RESPONSE=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"branch\":{\"name\":\"$BRANCH_NAME\",\"parent_id\":\"$PARENT_BRANCH_ID\",\"expires_at\":\"$EXPIRY\"}}")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          fi

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            echo "❌ Failed to obtain branch ID"
            exit 1
          fi

          # Wait until branch is ready
          for i in {1..20}; do
            BRANCH_STATUS=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID")
            STATE=$(echo "$BRANCH_STATUS" | jq -r '.branch.current_state')
            if [ "$STATE" = "ready" ]; then break; fi
            echo "Waiting for branch... ($i)"
            sleep 3
          done

          # Create or reuse endpoint
          ENDPOINTS_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints")
          ENDPOINT_ID=$(echo "$ENDPOINTS_JSON" | jq -r ".endpoints[] | select(.branch_id==\"$BRANCH_ID\") | .id")

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            RESPONSE=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"endpoint\":{\"branch_id\":\"$BRANCH_ID\",\"type\":\"read_write\"}}")
            ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.endpoint.id')
          fi

          # Wait until endpoint is ready (GET endpoint does not return credentials)
          for i in {1..30}; do
            STATUS=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints/$ENDPOINT_ID")
            STATE=$(echo "$STATUS" | jq -r '.endpoint.current_state')
            DB_HOST=$(echo "$STATUS" | jq -r '.endpoint.host')
            if [ "$STATE" = "ready" ] && [ -n "$DB_HOST" ] && [ "$DB_HOST" != "null" ]; then
              break
            fi
            echo "Waiting for endpoint... ($i)"
            sleep 3
          done

          if [ -z "$DB_HOST" ] || [ "$DB_HOST" = "null" ]; then
            echo "❌ Endpoint never became ready"
            exit 1
          fi

          # Get a role name for this branch (Neon GET endpoint does not return credentials)
          ROLES_JSON=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/roles")
          ROLE_NAME=$(echo "$ROLES_JSON" | jq -r '.roles[0].name // empty')
          if [ -z "$ROLE_NAME" ]; then
            echo "❌ No roles found for branch $BRANCH_ID"
            exit 1
          fi

          # Retrieve full connection URI (includes encoded credentials)
          URI_RESPONSE=$(neon_curl "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&endpoint_id=$ENDPOINT_ID&database_name=neondb&role_name=$ROLE_NAME")
          CONNECTION_URI=$(echo "$URI_RESPONSE" | jq -r '.uri // empty')
          if [ -z "$CONNECTION_URI" ]; then
            echo "❌ Failed to get connection URI: $URI_RESPONSE"
            exit 1
          fi

          # Verify actual DB connectivity before proceeding
          echo "Verifying database connectivity..."
          for i in {1..20}; do
            if psql "$CONNECTION_URI" -c "SELECT 1;" > /dev/null 2>&1; then
              echo "✅ Database connection verified"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "❌ Database connection failed after 20 attempts"
              exit 1
            fi
            echo "Waiting for database connectivity... ($i)"
            sleep 5
          done

          # Pass URI to next steps (delimiter format for special chars in password)
          echo "connection_uri<<EOF" >> $GITHUB_OUTPUT
          echo "$CONNECTION_URI" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "expires_at=$EXPIRY" >> $GITHUB_OUTPUT

      ############################################################
      # 4️⃣ Debug Neon (Optional)
      ############################################################
      - name: Debug Neon
        run: |
          echo "Connection URI is set (masked for security)"

      ############################################################
      # 5️⃣ Setup Node + Vercel
      ############################################################
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=preview --git-branch=${{ steps.slot.outputs.preview_branch }} --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_TOKEN }}

      ############################################################
      # 6️⃣ Build with Prisma
      ############################################################

      - name: Resolve Failed Migrations
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"
          echo "Checking for failed migrations..."
          
          # Check if the migration is in a failed state
          MIGRATION_STATUS=$(npx prisma migrate status 2>&1 || true)
          
          if echo "$MIGRATION_STATUS" | grep -q "20260301051356_add_voice_signature_to_user"; then
            echo "Found voice_signature migration, checking if it needs resolution..."
            
            # If the column already exists, mark the migration as applied
            COLUMN_EXISTS=$(psql "$DATABASE_URL" -tAc "SELECT COUNT(*) FROM information_schema.columns WHERE table_name='users' AND column_name='voice_signature_key';")
            
            if [ "$COLUMN_EXISTS" = "1" ]; then
              echo "Column already exists, marking migration as applied..."
              npx prisma migrate resolve --applied 20260301051356_add_voice_signature_to_user || echo "Could not mark as applied"
            else
              echo "Column doesn't exist, marking migration as rolled back for retry..."
              npx prisma migrate resolve --rolled-back 20260301051356_add_voice_signature_to_user || echo "Could not mark as rolled back"
            fi
          else
            echo "Migration not in failed state, proceeding normally"
          fi

      - name: Build
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"
          echo "DATABASE_URL is set (masked)"
          npx prisma generate
          npx prisma migrate deploy
          vercel build --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_TOKEN }}

      ############################################################
      # 7️⃣ Deploy to Vercel (with retry logic for transient errors)
      ############################################################
      - name: Deploy
        id: deploy
        run: |
          export DATABASE_URL="${{ steps.neon.outputs.connection_uri }}"

          # Retry logic for transient Vercel deployment errors with exponential backoff
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Deployment attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            
            if DEPLOY_OUTPUT=$(vercel deploy \
              --prebuilt \
              --scope=${{ secrets.VERCEL_ORG_ID }} \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --archive=tgz \
              --force \
              --env "DATABASE_URL=$DATABASE_URL" \
              --env "PREVIEW_LINK_BRANCH=${{ github.event.pull_request.head.ref }}" \
              --yes 2>&1); then
              # Extract the Preview URL from the output
              DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Preview: \Khttps://[^\s]+' | head -1)
              if [ -z "$DEPLOYMENT_URL" ]; then
                echo "Failed to extract deployment URL from output:"
                echo "$DEPLOY_OUTPUT"
                exit 1
              fi
              echo "Deployment URL: $DEPLOYMENT_URL"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                WAIT_TIME=$((30 * RETRY_COUNT))
                echo "Deployment failed, waiting $WAIT_TIME seconds before retry..."
                sleep $WAIT_TIME
              else
                echo "Deployment failed after $MAX_RETRIES attempts"
                echo "$DEPLOY_OUTPUT"
                exit 1
              fi
            fi
          done

          # Attach alias (--scope ensures we use Stakwork org, not token default)
          vercel alias set $DEPLOYMENT_URL ${{ steps.slot.outputs.preview_url }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --token=${{ secrets.VERCEL_TOKEN }}

          echo "deployment_url=https://${{ steps.slot.outputs.preview_url }}" >> $GITHUB_OUTPUT

      ############################################################
      # 8️⃣ Mark GitHub Deployment Status
      ############################################################
      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `preview-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: 'PR preview deployment'
            });
            return deployment.data.id;

      - name: Mark Success
        if: success() && steps.deployment.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.deployment_url }}'
            });

      - name: Comment PR with preview URL
        if: success() && steps.deploy.outputs.deployment_url
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- hive-preview-deploy -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComments = comments.filter(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const expiresAt = '${{ steps.neon.outputs.expires_at }}';
            const expiresReadable = expiresAt ? new Date(expiresAt).toLocaleString('en-US', { timeZone: 'UTC', dateStyle: 'medium', timeStyle: 'short' }) + ' UTC' : 'N/A';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Test environment is now live.**\n\nView it at: ${url}\n\nDatabase expires at: ${expiresReadable}\n\n${marker}`
            });

      - name: Mark Failure
        if: failure() && steps.deployment.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure'
            });
